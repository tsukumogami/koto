name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: koto-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: koto-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: koto-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: koto-darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --locked

      - name: Build (Linux, cross)
        if: matrix.os == 'ubuntu-latest'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (macOS, native)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/koto ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd ./artifacts
          sha256sum koto-* > checksums.txt
          echo "Generated checksums.txt:"
          cat checksums.txt

      - name: Extract release notes from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
          git tag -l --format='%(contents)' "${TAG}" > /tmp/release-notes.md
          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            ./artifacts/koto-linux-amd64 \
            ./artifacts/koto-linux-arm64 \
            ./artifacts/koto-darwin-amd64 \
            ./artifacts/koto-darwin-arm64 \
            ./artifacts/checksums.txt

  finalize-release:
    name: Finalize Release
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify all artifacts present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          EXPECTED_ARTIFACTS=(
            "koto-linux-amd64"
            "koto-linux-arm64"
            "koto-darwin-amd64"
            "koto-darwin-arm64"
          )

          echo "Verifying all ${#EXPECTED_ARTIFACTS[@]} artifacts are present..."
          ASSETS=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name')

          for artifact in "${EXPECTED_ARTIFACTS[@]}"; do
            if ! echo "$ASSETS" | grep -q "^${artifact}$"; then
              echo "ERROR: Missing artifact: $artifact"
              exit 1
            fi
            echo "Found: $artifact"
          done
          echo "All artifacts verified"

      - name: Pin koto-version default in reusable workflow
        run: |
          TAG="${GITHUB_REF_NAME}"
          WORKFLOW=".github/workflows/check-template-freshness.yml"

          if [ ! -f "$WORKFLOW" ]; then
            echo "Reusable workflow not found, skipping version pin"
            exit 0
          fi

          sed -i "s/default: 'latest'/default: '${TAG}'/" "$WORKFLOW"

          if git diff --quiet "$WORKFLOW"; then
            echo "No change needed (already pinned or pattern not found)"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW"
          git commit -m "chore(release): pin koto-version default to ${TAG}"
          git push origin main
