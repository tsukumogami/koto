name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: koto-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: koto-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: koto-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: koto-darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --locked

      - name: Build (Linux, cross)
        if: matrix.os == 'ubuntu-latest'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (macOS, native)
        if: matrix.os == 'macos-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/koto ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd ./artifacts
          sha256sum koto-* > checksums.txt
          echo "Generated checksums.txt:"
          cat checksums.txt

      - name: Upload assets to draft release or create one
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSETS=(
            ./artifacts/koto-linux-amd64
            ./artifacts/koto-linux-arm64
            ./artifacts/koto-darwin-amd64
            ./artifacts/koto-darwin-arm64
            ./artifacts/checksums.txt
          )

          # Check if a draft release already exists (created by /release skill)
          DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "not_found")

          if [ "$DRAFT" = "true" ]; then
            echo "Draft release found for $TAG, uploading assets..."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "No draft release found, creating one..."
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force
            git tag -l --format='%(contents)' "${TAG}" > /tmp/release-notes.md
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              "${ASSETS[@]}"
          fi
