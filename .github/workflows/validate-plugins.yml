name: validate-plugins

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'

jobs:
  template-compilation:
    name: Template Compilation
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build koto
        run: cargo build --release

      - name: Compile all templates
        run: |
          failed=0
          # Find template .md files under skills/, skipping SKILL.md files
          while IFS= read -r template; do
            echo "--- Compiling: $template"
            if ./target/release/koto template compile "$template"; then
              echo "PASS: $template"
            else
              echo "::error::Template compilation failed: $template"
              failed=1
            fi
          done < <(find plugins/koto-skills/skills/ -name '*.md' ! -name 'SKILL.md' ! -name 'AGENTS.md' ! -path '*/references/*' -type f)

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more templates failed compilation"
            exit 1
          fi
          echo "All templates compiled successfully."

  hook-smoke-test:
    name: Hook Smoke Test
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build koto
        run: cargo build --release

      - name: Test Stop hook with active workflow
        run: |
          # Create a mock state file in a session directory.
          # koto discovers workflows by scanning session directories under KOTO_SESSIONS_BASE.
          SESSIONS_BASE=$(mktemp -d)
          SESSION_DIR="$SESSIONS_BASE/mock"
          mkdir -p "$SESSION_DIR"
          printf '{"schema_version":1,"workflow":"mock","template_hash":"abc123","created_at":"2025-01-01T00:00:00Z"}\n{"seq":1,"timestamp":"2025-01-01T00:00:00Z","type":"workflow_initialized","payload":{"template_path":"mock","variables":{}}}\n{"seq":2,"timestamp":"2025-01-01T00:00:00Z","type":"transitioned","payload":{"from":null,"to":"test-state","condition_type":"auto"}}\n' > "$SESSION_DIR/koto-mock.state.jsonl"

          # Extract the hook command from hooks.json.
          HOOK_CMD=$(jq -r '.hooks.Stop[0].command' plugins/koto-skills/hooks.json)

          # The hook references 'koto' on PATH -- put our built binary on PATH.
          export PATH="$PWD/target/release:$PATH"
          export KOTO_SESSIONS_BASE="$SESSIONS_BASE"

          # Run the hook and capture output.
          OUTPUT=$(eval "$HOOK_CMD" 2>/dev/null || true)
          if echo "$OUTPUT" | grep -q 'Active koto workflow detected'; then
            echo "PASS: hook produced reminder with active workflow"
          else
            echo "::error::Hook did not produce expected reminder text"
            echo "Got: '$OUTPUT'"
            exit 1
          fi

      - name: Test Stop hook with no active workflow
        run: |
          # Use an empty sessions directory so no workflows are active.
          SESSIONS_BASE=$(mktemp -d)

          HOOK_CMD=$(jq -r '.hooks.Stop[0].command' plugins/koto-skills/hooks.json)
          export PATH="$PWD/target/release:$PATH"
          export KOTO_SESSIONS_BASE="$SESSIONS_BASE"

          OUTPUT=$(eval "$HOOK_CMD" 2>/dev/null || true)
          if [ -z "$OUTPUT" ]; then
            echo "PASS: hook is silent with no active workflows"
          else
            echo "::error::Hook produced unexpected output when no workflows are active"
            echo "Got: '$OUTPUT'"
            exit 1
          fi

  schema-validation:
    name: Schema Validation
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          PLUGIN_JSON="plugins/koto-skills/.claude-plugin/plugin.json"
          echo "--- Validating: $PLUGIN_JSON"

          # Check file exists
          test -f "$PLUGIN_JSON" || { echo "::error::$PLUGIN_JSON not found"; exit 1; }

          # Check required fields are present and non-empty
          jq -e '.name and (.name | length > 0)' "$PLUGIN_JSON" > /dev/null || {
            echo "::error::plugin.json: 'name' field is missing or empty"; exit 1;
          }
          jq -e '.version and (.version | length > 0)' "$PLUGIN_JSON" > /dev/null || {
            echo "::error::plugin.json: 'version' field is missing or empty"; exit 1;
          }
          jq -e '.skills and (.skills | length > 0)' "$PLUGIN_JSON" > /dev/null || {
            echo "::error::plugin.json: 'skills' field is missing or empty"; exit 1;
          }
          echo "PASS: plugin.json has required fields (name, version, skills)"

      - name: Validate marketplace.json
        run: |
          MARKETPLACE_JSON=".claude-plugin/marketplace.json"
          echo "--- Validating: $MARKETPLACE_JSON"

          # Check file exists
          test -f "$MARKETPLACE_JSON" || { echo "::error::$MARKETPLACE_JSON not found"; exit 1; }

          # Check required fields are present and non-empty
          jq -e '.name and (.name | length > 0)' "$MARKETPLACE_JSON" > /dev/null || {
            echo "::error::marketplace.json: 'name' field is missing or empty"; exit 1;
          }
          jq -e '.owner and (.owner | length > 0)' "$MARKETPLACE_JSON" > /dev/null || {
            echo "::error::marketplace.json: 'owner' field is missing or empty"; exit 1;
          }
          jq -e '.plugins and (.plugins | length > 0)' "$MARKETPLACE_JSON" > /dev/null || {
            echo "::error::marketplace.json: 'plugins' field is missing or empty"; exit 1;
          }
          echo "PASS: marketplace.json has required fields (name, owner, plugins)"

  validate-plugins:
    name: validate-plugins
    needs: [template-compilation, hook-smoke-test, schema-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.template-compilation.result }}" = "failure" ] || \
             [ "${{ needs.hook-smoke-test.result }}" = "failure" ] || \
             [ "${{ needs.schema-validation.result }}" = "failure" ]; then
            exit 1
          fi
