name: eval-plugins

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  eval-coverage:
    name: Eval Coverage Check
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all skills have evals
        run: bash scripts/check-evals-exist.sh

  no-hooks:
    name: No Hooks in Skills
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify no hooks.json in skill directories
        run: |
          failed=0
          while IFS= read -r skill_dir; do
            if [ -f "$skill_dir/hooks.json" ]; then
              echo "::error::hooks.json found in skill directory: $skill_dir"
              failed=1
            fi
          done < <(find plugins/*/skills/*/ -maxdepth 0 -type d 2>/dev/null)
          if [ "$failed" -eq 1 ]; then
            echo "hooks.json belongs at the plugin root, not in individual skill directories."
            exit 1
          fi
          echo "No hooks.json found in skill directories."

  eval-plugins:
    name: eval-plugins
    needs: [eval-coverage, no-hooks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.eval-coverage.result }}" = "failure" ] || \
             [ "${{ needs.no-hooks.result }}" = "failure" ]; then
            exit 1
          fi
