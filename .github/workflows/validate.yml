name: validate

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [main]

jobs:
  check-artifacts:
    name: Check Artifacts
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for work artifacts
        run: |
          failed=0
          for dir in wip; do
            if [ -d "$dir" ] && [ "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "::error::$dir/ contains intermediate work artifacts that should not be merged into main. Delete this folder before merging, or convert the PR to a draft while work is in progress."
              ls -la "$dir/"
              failed=1
            fi
          done
          exit $failed

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  tsuku-distributed-install:
    name: Distributed Install (tsuku)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tsuku
        run: |
          curl -fsSL https://get.tsuku.dev/now | bash
          echo "$HOME/.tsuku/bin" >> $GITHUB_PATH
          echo "$HOME/.tsuku/tools/current" >> $GITHUB_PATH

      - name: Install koto from local recipe (PR)
        if: github.event_name == 'pull_request'
        env:
          TSUKU_TELEMETRY: "0"
        run: |
          export TSUKU_HOME=/tmp/tsuku-test
          mkdir -p $TSUKU_HOME/recipes
          cp .tsuku-recipes/koto.toml $TSUKU_HOME/recipes/koto.toml
          tsuku install koto -y
          $TSUKU_HOME/tools/current/koto version

      - name: Install koto via distributed recipe (push)
        if: github.event_name == 'push'
        env:
          TSUKU_TELEMETRY: "0"
        run: tsuku install tsukumogami/koto -y

      - name: Verify installed koto (push)
        if: github.event_name == 'push'
        run: koto version

  validate:
    name: validate
    needs: [check-artifacts, unit-tests, fmt, clippy, audit, tsuku-distributed-install]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check-artifacts.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.fmt.result }}" = "failure" ] || \
             [ "${{ needs.clippy.result }}" = "failure" ] || \
             [ "${{ needs.audit.result }}" = "failure" ] || \
             [ "${{ needs.tsuku-distributed-install.result }}" = "failure" ]; then
            exit 1
          fi
