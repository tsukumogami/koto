name: validate

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]
    branches: [main]

jobs:
  check-artifacts:
    name: Check Artifacts
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for work artifacts
        run: |
          failed=0
          for dir in wip; do
            if [ -d "$dir" ] && [ "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "::error::$dir/ contains intermediate work artifacts that should not be merged into main. Delete this folder before merging, or convert the PR to a draft while work is in progress."
              ls -la "$dir/"
              failed=1
            fi
          done
          exit $failed

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -- --test-threads=1

  stability-tests:
    # Issue 20: external-consumer compile-check fixture for the
    # Stage 1 frozen public surface. The `koto-stability-tests` crate
    # imports every promised export via `use koto::engine::types::*`
    # and `koto::error::Error`, plus exercises the four frozen
    # SessionBackend methods through a trait object. A breaking
    # change to the locked surface fails this job before it reaches
    # a release.
    #
    # See docs/STABILITY.md for the bump protocol.
    name: Stability Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run external-consumer stability tests
        run: cargo test -p koto-stability-tests -- --test-threads=1

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit
        run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info -- --test-threads=1

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  tsuku-distributed-install:
    name: Distributed Install (tsuku)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tsuku
        run: |
          curl -fsSL https://get.tsuku.dev/now | bash
          echo "$HOME/.tsuku/bin" >> $GITHUB_PATH
          echo "$HOME/.tsuku/tools/current" >> $GITHUB_PATH

      - name: Verify koto recipe syntax (PR)
        if: github.event_name == 'pull_request'
        env:
          TSUKU_TELEMETRY: "0"
        run: |
          tsuku recipe validate .tsuku-recipes/koto.toml || echo "Recipe validation not available, skipping"

      - name: Install koto via distributed recipe (push)
        if: github.event_name == 'push'
        env:
          TSUKU_TELEMETRY: "0"
        run: tsuku install tsukumogami/koto -y

      - name: Verify installed koto (push)
        if: github.event_name == 'push'
        run: koto version

  cloud-integration:
    name: Cloud Integration Tests
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run cloud integration tests
        env:
          KOTO_TEST_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          KOTO_TEST_S3_BUCKET: ${{ secrets.R2_TEST_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$KOTO_TEST_S3_ENDPOINT" ]; then
            echo "R2 secrets not configured, skipping cloud integration tests"
            exit 0
          fi
          cargo test --features cloud-integration-tests --test cloud_integration_test -- --test-threads=1

  discovery-bench:
    # Issue 10: criterion bench harness for the discovery scan.
    # Runs the warm-cursor + cold-cursor groups at 100/1k/10k/26k
    # workspace sizes. Threshold gating is REPORTING-ONLY by default
    # (KOTO_BENCH_STRICT is unset); the bench emits `BREACH` lines to
    # stderr but exits 0 so the harness lands without producing a
    # red-on-main signal while the perf-optimization issue is open.
    # See `benches/discovery_scan.rs` file-header "Gate-enforcement
    # mode" for the rationale and the path to strict enforcement.
    name: Discovery Bench
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run discovery scan bench
        # `--save-baseline ci` lets criterion compare each PR's run
        # against the prior CI baseline. Combined with the bench's own
        # gate (reporting-only by default), this gives a two-tier
        # signal: criterion's regression detector AND the absolute
        # thresholds.
        run: cargo bench --bench discovery_scan -- --save-baseline ci

  recursion-caps-bench:
    # Issue 17: criterion bench harness for the recursion-cap
    # validator at 1k/10k/26k workspace sizes with 100 open sessions.
    # The 26k case measures the AD3.3 perf-cliff avoidance commitment
    # (30 ms p95 target). Soft-by-default like Issue 10's bench; the
    # current implementation breaches because `read_terminal_index`
    # walks the full JSONL file — a follow-up optimization (either an
    # O(open-sessions) counter primitive or a smarter index format)
    # closes the gap. Once closed, flip KOTO_BENCH_STRICT=1 to harden.
    name: Recursion Caps Bench
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run recursion caps bench
        run: cargo bench --bench recursion_caps -- --save-baseline ci

  validate:
    name: validate
    needs: [check-artifacts, unit-tests, stability-tests, fmt, clippy, audit, tsuku-distributed-install, cloud-integration, discovery-bench, recursion-caps-bench]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.check-artifacts.result }}" = "failure" ] || \
             [ "${{ needs.unit-tests.result }}" = "failure" ] || \
             [ "${{ needs.stability-tests.result }}" = "failure" ] || \
             [ "${{ needs.fmt.result }}" = "failure" ] || \
             [ "${{ needs.clippy.result }}" = "failure" ] || \
             [ "${{ needs.audit.result }}" = "failure" ] || \
             [ "${{ needs.cloud-integration.result }}" = "failure" ] || \
             [ "${{ needs.tsuku-distributed-install.result }}" = "failure" ]; then
            exit 1
          fi
