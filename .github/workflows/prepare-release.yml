name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver without v prefix (e.g., 0.4.0)'
        required: true
        type: string
      tag:
        description: 'Git tag with v prefix (e.g., v0.4.0)'
        required: true
        type: string
      ref:
        description: 'Branch to release from'
        required: true
        type: string
        default: main

jobs:
  release:
    uses: tsukumogami/shirabe/.github/workflows/release.yml@v0.2.0
    with:
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      ref: ${{ inputs.ref }}
    secrets:
      token: ${{ secrets.RELEASE_PAT }}
