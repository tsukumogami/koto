name: check-template-freshness

on:
  workflow_call:
    inputs:
      template-paths:
        description: >
          Glob pattern matching template .md files to check.
          Example: 'templates/**/*.md'
        required: true
        type: string
      check-html:
        description: >
          Also check HTML freshness. When true, the workflow verifies
          both .mermaid.md and .html artifacts for each template.
        required: false
        type: boolean
        default: false
      html-output-dir:
        description: >
          Directory for HTML output files (relative to repo root).
          Only used when check-html is true. HTML files are named
          <template-stem>.html within this directory.
        required: false
        type: string
        default: 'docs'

jobs:
  check-freshness:
    name: Template Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install koto
        run: |
          curl -fsSL https://raw.githubusercontent.com/tsukumogami/koto/main/install.sh | bash -s -- --no-modify-path
          echo "$HOME/.koto/bin" >> "$GITHUB_PATH"
          koto version

      - name: Check Mermaid freshness
        run: |
          failed=0
          found=0
          while IFS= read -r template; do
            [ -z "$template" ] && continue
            found=1
            stem="${template%.md}"
            output="${stem}.mermaid.md"

            echo "--- Checking: $template -> $output"
            if koto template export "$template" \
                --format mermaid \
                --output "$output" \
                --check; then
              echo "PASS: $output is fresh"
            else
              echo "::error file=${output}::Mermaid diagram is stale or missing. Run: koto template export \"$template\" --format mermaid --output \"$output\""
              failed=1
            fi
          done < <(compgen -G '${{ inputs.template-paths }}' || true)

          if [ "$found" -eq 0 ]; then
            echo "::warning::No templates matched the glob pattern: ${{ inputs.template-paths }}"
          fi

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "::error::One or more Mermaid diagrams are stale. See above for fix commands."
            exit 1
          fi
          echo "All Mermaid diagrams are fresh."

      - name: Check HTML freshness
        if: inputs.check-html
        run: |
          failed=0
          html_dir="${{ inputs.html-output-dir }}"

          while IFS= read -r template; do
            [ -z "$template" ] && continue
            stem=$(basename "${template%.md}")
            output="${html_dir}/${stem}.html"

            echo "--- Checking: $template -> $output"
            if koto template export "$template" \
                --format html \
                --output "$output" \
                --check; then
              echo "PASS: $output is fresh"
            else
              echo "::error file=${output}::HTML diagram is stale or missing. Run: koto template export \"$template\" --format html --output \"$output\""
              failed=1
            fi
          done < <(compgen -G '${{ inputs.template-paths }}' || true)

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "::error::One or more HTML diagrams are stale. See above for fix commands."
            exit 1
          fi
          echo "All HTML diagrams are fresh."
