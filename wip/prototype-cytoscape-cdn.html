<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koto workflow: work-on (cytoscape.js + CDN prototype)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; }
  header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header .meta { font-size: 13px; color: #666; }
  #cy { width: 100%; height: calc(100vh - 48px); }
  .legend { position: absolute; bottom: 16px; left: 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 12px; z-index: 10; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-swatch { width: 24px; height: 14px; border-radius: 3px; border: 1.5px solid; }
  #tooltip { display: none; position: absolute; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; max-width: 360px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100; pointer-events: none; }
  #tooltip h3 { font-size: 14px; margin-bottom: 6px; }
  #tooltip .section { margin-top: 8px; }
  #tooltip .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 2px; }
  #tooltip code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  #tooltip .field { display: flex; gap: 8px; font-size: 12px; padding: 2px 0; }
  #tooltip .field-name { font-weight: 500; min-width: 60px; }
  #tooltip .field-type { color: #888; }
</style>
<script src="https://unpkg.com/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
</head>
<body>
<header>
  <h1>work-on</h1>
  <span class="meta">v1.0 &middot; 12 states &middot; prototype: cytoscape.js + CDN (no tippy)</span>
</header>
<div id="cy"></div>
<div id="tooltip"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="border-color:#1976d2;background:#e3f2fd;"></div> Initial</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#4caf50;background:#e8f5e9;"></div> Terminal</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#e65100;background:#fff3e0;border-style:dashed;"></div> Gated</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#333;background:#fff8e1;"></div> Branching</div>
</div>
<script>
const stateData = {
  "setup": {
    directive: "Initialize the workspace. Create the working branch, source environment, check prerequisites.",
    transitions: [{target:"context"}],
    _type: "initial"
  },
  "context": {
    directive: "Gather context about the issue or task. Read the issue, check for staleness, gather upstream references.",
    gates: {"gh_issue_view": {type:"command", command:"gh issue view $ISSUE --json title,body,labels"}},
    transitions: [{target:"triage", when:{mode:"issue"}}, {target:"freeform-analysis", when:{mode:"freeform"}}],
    accepts: {mode: {field_type:"enum", required:true, values:["issue","freeform"]}},
    _type: "gated"
  },
  "triage": {
    directive: "Assess the issue. Check priority, scope, and whether it needs design work first.",
    accepts: {priority: {field_type:"enum", required:true, values:["high","medium","low"]}, scope: {field_type:"enum", required:true, values:["small","medium","large"]}},
    transitions: [{target:"staleness-check"}],
    _type: "branching"
  },
  "freeform-analysis": {
    directive: "Analyze the freeform task. Break down what needs to happen.",
    accepts: {approach: {field_type:"string", required:true}},
    transitions: [{target:"freeform-planning"}],
    _type: "normal"
  },
  "staleness-check": {
    directive: "Verify the issue spec is still current. Check for recent changes that might affect the plan.",
    gates: {"issue_freshness": {type:"command", command:"gh issue view $ISSUE --json updatedAt"}},
    transitions: [{target:"planning"}],
    _type: "gated"
  },
  "freeform-planning": {
    directive: "Create a plan for the freeform task.",
    accepts: {plan: {field_type:"string", required:true}},
    transitions: [{target:"planning"}],
    _type: "normal"
  },
  "planning": {
    directive: "Write the implementation plan. Produce wip/plan.md with step-by-step approach.",
    gates: {"plan_exists": {type:"command", command:"test -f wip/plan.md"}},
    accepts: {status: {field_type:"enum", required:true, values:["completed","override"]}},
    transitions: [{target:"implementation"}],
    _type: "gated"
  },
  "implementation": {
    directive: "Implement the changes according to the plan. Write code, tests, documentation.",
    accepts: {status: {field_type:"enum", required:true, values:["completed","needs-tests","skip-tests"]}},
    transitions: [{target:"testing", when:{status:"completed"}}, {target:"pr-creation", when:{status:"skip-tests"}}],
    _type: "normal"
  },
  "testing": {
    directive: "Run tests and verify the implementation.",
    gates: {"tests_pass": {type:"command", command:"go test ./..."}},
    transitions: [{target:"pr-creation"}],
    _type: "gated"
  },
  "pr-creation": {
    directive: "Create the pull request.",
    accepts: {pr_url: {field_type:"string", required:true}},
    transitions: [{target:"ci-monitor"}],
    _type: "normal"
  },
  "ci-monitor": {
    directive: "Monitor CI checks on the pull request.",
    gates: {"ci_green": {type:"command", command:"gh pr checks $PR_URL --watch"}},
    transitions: [{target:"done"}],
    _type: "gated"
  },
  "done": {
    directive: "Workflow complete. PR is merged or ready for review.",
    terminal: true,
    _type: "terminal"
  }
};

// Build cytoscape elements
const elements = [];
for (const [name, data] of Object.entries(stateData)) {
  const hasGates = data.gates && Object.keys(data.gates).length > 0;
  const hasAccepts = data.accepts && Object.keys(data.accepts).length > 0;
  const isTerminal = data.terminal === true;
  const isInitial = data._type === 'initial';
  const isBranching = data.transitions && data.transitions.length > 1;

  elements.push({
    data: {
      id: name,
      label: name,
      nodeType: isTerminal ? 'terminal' : isInitial ? 'initial' : hasGates ? 'gated' : isBranching ? 'branching' : 'normal'
    }
  });

  if (data.transitions) {
    for (const t of data.transitions) {
      const cond = t.when ? Object.entries(t.when).map(([k,v])=>`${k}=${v}`).join(', ') : '';
      elements.push({
        data: {
          id: `${name}->${t.target}`,
          source: name,
          target: t.target,
          label: cond
        }
      });
    }
  }
}

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: elements,
  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '13px',
        'font-family': '-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif',
        'font-weight': 600,
        'background-color': '#fff',
        'border-width': 1.5,
        'border-color': '#333',
        'shape': 'round-rectangle',
        'width': 'label',
        'height': 40,
        'padding': '24px',
        'text-wrap': 'wrap',
        'text-max-width': '140px'
      }
    },
    {
      selector: 'node[nodeType="initial"]',
      style: { 'border-color': '#1976d2', 'border-width': 2.5, 'background-color': '#e3f2fd' }
    },
    {
      selector: 'node[nodeType="terminal"]',
      style: { 'border-color': '#4caf50', 'background-color': '#e8f5e9' }
    },
    {
      selector: 'node[nodeType="gated"]',
      style: { 'border-color': '#e65100', 'border-style': 'dashed', 'background-color': '#fff3e0' }
    },
    {
      selector: 'node[nodeType="branching"]',
      style: { 'background-color': '#fff8e1' }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': '#999',
        'target-arrow-color': '#999',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'label': 'data(label)',
        'font-size': '11px',
        'font-family': 'SF Mono, Fira Code, monospace',
        'color': '#666',
        'text-rotation': 'autorotate',
        'text-margin-y': -10,
        'text-background-color': '#f8f9fa',
        'text-background-opacity': 0.9,
        'text-background-padding': '2px'
      }
    },
    {
      selector: '.faded',
      style: {
        'opacity': 0.2,
        'transition-property': 'opacity',
        'transition-duration': '0.2s'
      }
    },
    {
      selector: ':selected',
      style: {
        'border-color': '#1976d2',
        'border-width': 3,
        'line-color': '#1976d2',
        'target-arrow-color': '#1976d2'
      }
    }
  ],
  layout: {
    name: 'dagre',
    rankDir: 'TB',
    nodeSep: 60,
    rankSep: 80,
    edgeSep: 30,
    padding: 40
  }
});

// Vanilla tooltip (no tippy dependency)
const tooltip = document.getElementById('tooltip');

function buildTooltipHtml(name, data) {
  let html = `<h3>${name}</h3><p>${data.directive}</p>`;
  if (data.gates) {
    html += '<div class="section"><div class="section-title">Gates</div>';
    for (const [k,v] of Object.entries(data.gates)) {
      html += `<div class="field"><span class="field-name">${k}</span><code>${v.command}</code></div>`;
    }
    html += '</div>';
  }
  if (data.accepts) {
    html += '<div class="section"><div class="section-title">Evidence Schema</div>';
    for (const [k,v] of Object.entries(data.accepts)) {
      const vals = v.values ? ` [${v.values.join(', ')}]` : '';
      html += `<div class="field"><span class="field-name">${k}</span><span class="field-type">${v.field_type}${vals}</span></div>`;
    }
    html += '</div>';
  }
  if (data.transitions && data.transitions.length > 0) {
    html += '<div class="section"><div class="section-title">Transitions</div>';
    for (const t of data.transitions) {
      const cond = t.when ? ` when ${Object.entries(t.when).map(([k,v])=>`${k}=${v}`).join(', ')}` : ' (unconditional)';
      html += `<div class="field">&rarr; ${t.target}${cond}</div>`;
    }
    html += '</div>';
  }
  return html;
}

cy.on('mouseover', 'node', evt => {
  const node = evt.target;
  const data = stateData[node.id()];
  if (!data) return;
  tooltip.innerHTML = buildTooltipHtml(node.id(), data);
  tooltip.style.display = 'block';
});

cy.on('mousemove', 'node', evt => {
  const e = evt.originalEvent;
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY + 16) + 'px';
});

cy.on('mouseout', 'node', () => {
  tooltip.style.display = 'none';
});

// Click to highlight neighborhood
cy.on('tap', 'node', evt => {
  cy.elements().removeClass('faded');
  const node = evt.target;
  const neighborhood = node.closedNeighborhood();
  cy.elements().not(neighborhood).addClass('faded');
});
cy.on('tap', evt => {
  if (evt.target === cy) cy.elements().removeClass('faded');
});
</script>
</body>
</html>
