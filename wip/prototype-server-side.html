<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koto workflow: work-on (server-side layout prototype)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #1a1a2e; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a2e; color: #e0e0e0; }
    .state-node rect { fill: #2a2a4a; stroke: #555; }
    .state-node text { fill: #e0e0e0; }
    .state-node.terminal rect { fill: #1a3a2a; stroke: #4a8; }
    .state-node.initial rect { stroke: #58a; stroke-width: 2.5; }
    .state-node.gated rect { stroke-dasharray: 6 3; stroke: #a85; }
    .edge line, .edge path { stroke: #666; }
    .edge polygon { fill: #666; }
    .edge-label { fill: #bbb; }
    .tooltip { background: #2a2a4a; border-color: #555; color: #e0e0e0; }
    .badge { fill: #888; }
    header { background: #2a2a4a; border-color: #333; }
    header h1 { color: #e0e0e0; }
    header .meta { color: #999; }
    .legend { background: #2a2a4a; border-color: #555; }
    .minimap { background: #2a2a4a; border-color: #555; }
  }
  header { padding: 12px 20px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: baseline; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header .meta { font-size: 13px; color: #666; }
  #canvas-container { width: 100%; height: calc(100vh - 48px); overflow: hidden; position: relative; cursor: grab; }
  #canvas-container:active { cursor: grabbing; }
  svg { width: 100%; height: 100%; }
  .state-node rect { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 6; ry: 6; cursor: pointer; transition: filter 0.15s; }
  .state-node:hover rect { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
  .state-node text { font-size: 13px; font-family: inherit; pointer-events: none; }
  .state-node .name { font-weight: 600; font-size: 14px; }
  .state-node.terminal rect { fill: #e8f5e9; stroke: #4caf50; }
  .state-node.initial rect { stroke: #1976d2; stroke-width: 2.5; }
  .state-node.gated rect { stroke-dasharray: 6 3; stroke: #e65100; }
  .state-node.branching rect { fill: #fff8e1; }
  .badge { font-size: 10px; fill: #666; }
  .edge line, .edge path { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  .edge polygon { fill: #999; }
  .edge-label { font-size: 11px; fill: #666; font-family: 'SF Mono', 'Fira Code', monospace; }
  .tooltip { display: none; position: absolute; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; max-width: 360px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 100; pointer-events: none; }
  .tooltip h3 { font-size: 14px; margin-bottom: 6px; }
  .tooltip .section { margin-top: 8px; }
  .tooltip .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 2px; }
  .tooltip code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .tooltip .field { display: flex; gap: 8px; font-size: 12px; padding: 2px 0; }
  .tooltip .field-name { font-weight: 500; min-width: 60px; }
  .tooltip .field-type { color: #888; }
  .legend { position: absolute; bottom: 16px; left: 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-swatch { width: 24px; height: 14px; border-radius: 3px; border: 1.5px solid; }
  .minimap { position: absolute; bottom: 16px; right: 16px; width: 160px; height: 100px; background: #fff; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
  .minimap svg { width: 100%; height: 100%; }
  .minimap .viewport-rect { fill: rgba(25, 118, 210, 0.15); stroke: #1976d2; stroke-width: 1; }
</style>
</head>
<body>
<header>
  <h1>work-on</h1>
  <span class="meta">v1.0 &middot; 12 states &middot; prototype: server-side layout</span>
</header>
<div id="canvas-container">
<svg id="graph" viewBox="0 0 900 820">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>
  <g id="viewport">
    <!-- Edges (drawn first, behind nodes) -->
    <!-- setup -> context -->
    <g class="edge"><line x1="450" y1="70" x2="450" y2="130"/></g>
    <!-- context -> triage (branching) -->
    <g class="edge"><line x1="450" y1="190" x2="280" y2="270"/><text class="edge-label" x="340" y="225">issue</text></g>
    <g class="edge"><line x1="450" y1="190" x2="620" y2="270"/><text class="edge-label" x="555" y="225">freeform</text></g>
    <!-- triage -> staleness-check -->
    <g class="edge"><line x1="280" y1="330" x2="280" y2="390"/></g>
    <!-- freeform-analysis -> planning -->
    <g class="edge"><line x1="620" y1="330" x2="620" y2="390"/></g>
    <!-- staleness-check -> planning -->
    <g class="edge"><line x1="280" y1="450" x2="450" y2="510"/></g>
    <!-- freeform-planning -> planning -->
    <g class="edge"><line x1="620" y1="450" x2="450" y2="510"/></g>
    <!-- planning -> implementation -->
    <g class="edge"><line x1="450" y1="570" x2="450" y2="630"/></g>
    <!-- implementation -> testing -->
    <g class="edge"><line x1="450" y1="690" x2="280" y2="730"/></g>
    <!-- implementation -> pr-creation (skip tests) -->
    <g class="edge"><line x1="450" y1="690" x2="620" y2="730"/><text class="edge-label" x="555" y="705">skip-tests</text></g>
    <!-- testing -> pr-creation -->
    <g class="edge"><line x1="280" y1="790" x2="450" y2="830"/></g>
    <!-- pr-creation from right -->
    <g class="edge"><line x1="620" y1="790" x2="450" y2="830"/></g>
    <!-- pr-creation -> done -->
    <g class="edge"><line x1="450" y1="890" x2="450" y2="930"/></g>

    <!-- Nodes -->
    <g class="state-node initial" data-state="setup" transform="translate(350, 30)">
      <rect width="200" height="40"/>
      <text class="name" x="100" y="25" text-anchor="middle">setup</text>
    </g>
    <g class="state-node" data-state="context" transform="translate(350, 130)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">context</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f512; gate: gh issue view</text>
    </g>
    <g class="state-node branching" data-state="triage" transform="translate(180, 270)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">triage</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f4cb; accepts: priority, scope</text>
    </g>
    <g class="state-node" data-state="freeform-analysis" transform="translate(520, 270)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">freeform-analysis</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f4cb; accepts: approach</text>
    </g>
    <g class="state-node gated" data-state="staleness-check" transform="translate(180, 390)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">staleness-check</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f512; gate: issue freshness</text>
    </g>
    <g class="state-node" data-state="freeform-planning" transform="translate(520, 390)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">freeform-planning</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f4cb; accepts: plan</text>
    </g>
    <g class="state-node gated" data-state="planning" transform="translate(350, 510)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">planning</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f512; gate: wip/plan.md</text>
    </g>
    <g class="state-node" data-state="implementation" transform="translate(350, 630)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">implementation</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f4cb; accepts: status</text>
    </g>
    <g class="state-node gated" data-state="testing" transform="translate(180, 730)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">testing</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f512; gate: go test ./...</text>
    </g>
    <g class="state-node" data-state="pr-creation" transform="translate(520, 730)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">pr-creation</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f4cb; accepts: pr_url</text>
    </g>
    <g class="state-node" data-state="ci-monitor" transform="translate(350, 830)">
      <rect width="200" height="60"/>
      <text class="name" x="100" y="22" text-anchor="middle">ci-monitor</text>
      <text class="badge" x="100" y="42" text-anchor="middle">&#x1f512; gate: gh pr checks</text>
    </g>
    <g class="state-node terminal" data-state="done" transform="translate(350, 930)">
      <rect width="200" height="40"/>
      <text class="name" x="100" y="25" text-anchor="middle">done</text>
    </g>
  </g>
</svg>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="border-color:#1976d2;background:#e3f2fd;"></div> Initial</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#4caf50;background:#e8f5e9;"></div> Terminal</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#e65100;background:#fff;border-style:dashed;"></div> Gated</div>
  <div class="legend-item"><div class="legend-swatch" style="border-color:#333;background:#fff8e1;"></div> Branching</div>
</div>
<script>
const stateData = {
  "setup": {
    directive: "Initialize the workspace. Create the working branch, source environment, check prerequisites.",
    transitions: [{target:"context"}]
  },
  "context": {
    directive: "Gather context about the issue or task. Read the issue, check for staleness, gather upstream references.",
    gates: {"gh_issue_view": {type:"command", command:"gh issue view $ISSUE --json title,body,labels"}},
    transitions: [{target:"triage", when:{mode:"issue"}}, {target:"freeform-analysis", when:{mode:"freeform"}}],
    accepts: {mode: {field_type:"enum", required:true, values:["issue","freeform"]}}
  },
  "triage": {
    directive: "Assess the issue. Check priority, scope, and whether it needs design work first.",
    accepts: {priority: {field_type:"enum", required:true, values:["high","medium","low"]}, scope: {field_type:"enum", required:true, values:["small","medium","large"]}},
    transitions: [{target:"staleness-check"}]
  },
  "freeform-analysis": {
    directive: "Analyze the freeform task. Break down what needs to happen.",
    accepts: {approach: {field_type:"string", required:true}},
    transitions: [{target:"freeform-planning"}]
  },
  "staleness-check": {
    directive: "Verify the issue spec is still current. Check for recent changes that might affect the plan.",
    gates: {"issue_freshness": {type:"command", command:"gh issue view $ISSUE --json updatedAt"}},
    transitions: [{target:"planning"}]
  },
  "freeform-planning": {
    directive: "Create a plan for the freeform task.",
    accepts: {plan: {field_type:"string", required:true}},
    transitions: [{target:"planning"}]
  },
  "planning": {
    directive: "Write the implementation plan. Produce wip/plan.md with step-by-step approach.",
    gates: {"plan_exists": {type:"command", command:"test -f wip/plan.md"}},
    accepts: {status: {field_type:"enum", required:true, values:["completed","override"]}},
    transitions: [{target:"implementation"}]
  },
  "implementation": {
    directive: "Implement the changes according to the plan. Write code, tests, documentation.",
    accepts: {status: {field_type:"enum", required:true, values:["completed","needs-tests","skip-tests"]}},
    transitions: [{target:"testing", when:{status:"completed"}}, {target:"pr-creation", when:{status:"skip-tests"}}]
  },
  "testing": {
    directive: "Run tests and verify the implementation.",
    gates: {"tests_pass": {type:"command", command:"go test ./..."}},
    transitions: [{target:"pr-creation"}]
  },
  "pr-creation": {
    directive: "Create the pull request.",
    accepts: {pr_url: {field_type:"string", required:true}},
    transitions: [{target:"ci-monitor"}]
  },
  "ci-monitor": {
    directive: "Monitor CI checks on the pull request.",
    gates: {"ci_green": {type:"command", command:"gh pr checks $PR_URL --watch"}},
    transitions: [{target:"done"}]
  },
  "done": {
    directive: "Workflow complete. PR is merged or ready for review.",
    terminal: true
  }
};

// Pan and zoom
const container = document.getElementById('canvas-container');
const svg = document.getElementById('graph');
const viewport = document.getElementById('viewport');
let viewBox = {x: 0, y: 0, w: 900, h: 820};
let isPanning = false, startX, startY;

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}

container.addEventListener('wheel', e => {
  e.preventDefault();
  const scale = e.deltaY > 0 ? 1.1 : 0.9;
  const rect = svg.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;
  const newW = viewBox.w * scale, newH = viewBox.h * scale;
  viewBox.x += (viewBox.w - newW) * mx;
  viewBox.y += (viewBox.h - newH) * my;
  viewBox.w = newW; viewBox.h = newH;
  updateViewBox();
}, {passive: false});

container.addEventListener('mousedown', e => { isPanning = true; startX = e.clientX; startY = e.clientY; });
container.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - startX) * (viewBox.w / rect.width);
  const dy = (e.clientY - startY) * (viewBox.h / rect.height);
  viewBox.x -= dx; viewBox.y -= dy;
  startX = e.clientX; startY = e.clientY;
  updateViewBox();
});
container.addEventListener('mouseup', () => isPanning = false);
container.addEventListener('mouseleave', () => isPanning = false);

// Tooltips
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.state-node').forEach(node => {
  node.addEventListener('mouseenter', e => {
    const name = node.dataset.state;
    const data = stateData[name];
    if (!data) return;
    let html = `<h3>${name}</h3><p>${data.directive}</p>`;
    if (data.gates) {
      html += '<div class="section"><div class="section-title">Gates</div>';
      for (const [k,v] of Object.entries(data.gates)) {
        html += `<div class="field"><span class="field-name">${k}</span><code>${v.command}</code></div>`;
      }
      html += '</div>';
    }
    if (data.accepts) {
      html += '<div class="section"><div class="section-title">Evidence Schema</div>';
      for (const [k,v] of Object.entries(data.accepts)) {
        const vals = v.values ? ` [${v.values.join(', ')}]` : '';
        html += `<div class="field"><span class="field-name">${k}</span><span class="field-type">${v.field_type}${vals}</span></div>`;
      }
      html += '</div>';
    }
    if (data.transitions && data.transitions.length > 0) {
      html += '<div class="section"><div class="section-title">Transitions</div>';
      for (const t of data.transitions) {
        const cond = t.when ? ` when ${Object.entries(t.when).map(([k,v])=>`${k}=${v}`).join(', ')}` : ' (unconditional)';
        html += `<div class="field">&rarr; ${t.target}${cond}</div>`;
      }
      html += '</div>';
    }
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
  });
  node.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top = (e.clientY + 16) + 'px';
  });
  node.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
});
</script>
</body>
</html>
